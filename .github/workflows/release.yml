name: Release

# Two-step release flow:
#
#   1. release-please job runs on every push to main. It reads
#      conventional-commit history and *either* opens / updates a
#      release PR (no publish), *or*, when that PR has been merged,
#      cuts the tag + GitHub Release and emits release_created=true.
#
#   2. publish-npm job runs only when release_created=true. It checks
#      out the freshly tagged commit, builds, and publishes to npm
#      with the `latest` dist-tag. provenance=true (set in
#      package.json publishConfig) requires id-token: write below.
#
# Why one workflow rather than two: release-please's output values
# (`release_created`, `tag_name`) are easiest to consume in the same
# workflow, and we want a single source of truth for "what version
# went out and when".
#
# Docs:
#   - release-please:   https://github.com/googleapis/release-please-action
#   - npm provenance:  https://docs.npmjs.com/generating-provenance-statements

on:
  push:
    branches: [main]

# Job-level permissions are tighter (publish-npm narrows further).
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      # Exposed so publish-npm can decide whether to run.
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name:        ${{ steps.rp.outputs.tag_name }}
      version:         ${{ steps.rp.outputs.version }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v5
        with:
          # Manifest mode — release-please-config.json +
          # .release-please-manifest.json at the repo root drive
          # everything. Keeps room to switch to per-package
          # versioning later without touching this workflow.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    # `id-token: write` is required for npm provenance attestations
    # (publishConfig.provenance=true in package.json). `contents: read`
    # is enough — we're not pushing back to the repo, just checking
    # out the tag.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout the tagged commit
        uses: actions/checkout@v6
        with:
          # release-please updates package.json + CHANGELOG.md in
          # the same commit it tags, so checking out the tag is
          # equivalent to checking out main HEAD at this point.
          # Using the tag explicitly is safer in case another
          # push lands on main between the two jobs.
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          # Tell setup-node where the registry is so the npm config
          # written into ~/.npmrc points at npmjs.org rather than
          # any cached mirror. Also makes NODE_AUTH_TOKEN take
          # effect for publish.
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      # Sanity checks before we actually publish. Catches:
      #   - tarball size suddenly tripled (someone added a huge
      #     asset to `files:` accidentally)
      #   - publishConfig.access flipped to restricted
      #   - bin path broken
      - name: Inspect the would-be tarball
        run: |
          npm pack --dry-run 2>&1 | tail -40
          echo "---"
          node -e "const p = require('./package.json'); console.log('name=' + p.name, 'version=' + p.version, 'access=' + (p.publishConfig && p.publishConfig.access));"

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## :rocket: Published \`@tianshu-ai/tianshu@${{ needs.release-please.outputs.version }}\` to npm" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Registry: https://www.npmjs.com/package/@tianshu-ai/tianshu/v/${{ needs.release-please.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: \`${{ needs.release-please.outputs.tag_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Provenance: attested via npm registry (\`publishConfig.provenance: true\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Install: \`npm install -g @tianshu-ai/tianshu@${{ needs.release-please.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
