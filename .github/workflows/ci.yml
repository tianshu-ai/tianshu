name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs of this workflow when a new push lands on the same
# branch / PR — saves CI minutes on rapid iterations.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ["22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        # Switch to `npm ci` once package-lock.json lands.
        run: npm install --no-audit --no-fund

      - name: Type-check & build
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -f packages/web/dist/index.html
          test -d packages/web/dist/assets
          test -f packages/server/dist/index.js
          echo "✓ build artifacts present"

      - name: Run tests
        run: npm test
