# Minimal Sandboxfile — same as the new-Sandboxfile placeholder.
# Use this when you just want a clean python:3.12-slim with room
# to add layers later.
#
# IMPORTANT: the runner runs every agent `exec` as the tenant user
# (via `runuser`) and grants it nopasswd `sudo`. The image must
# have `sudo` and `runuser` (the latter ships with util-linux on
# every standard distro). The default exec block below installs
# sudo via apt; remove it only if your base image is not Debian.

image: python:3.12-slim
cpus: 4
memory_mib: 4096

exec:
  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends sudo
  - rm -rf /var/lib/apt/lists/*

# Uncomment and edit to add layers:
# apt:
#   - libreoffice-writer
#   - fonts-noto-cjk
# pip:
#   - pandas
#   - numpy
# npm:
#   - tsx
#   - typescript
