# Minimal Sandboxfile — placeholder for custom builds.
#
# Use this as a starting point when you want to author your own
# image from scratch. It does the bare minimum the runner expects
# (sudo for the runuser-as-tenant-user privilege drop, see PR
# #139) and nothing else. Add layers below as needed.
#
# If you just want a working agent-task environment out of the box,
# pick `task-runner.yaml` instead — it ships Node, Python, common
# pip libs, libreoffice, fonts, and the China-mainland mirror
# config already wired up.

image: python:3.12-slim
cpus: 4
memory_mib: 4096

exec:
  - apt-get update -qq
  - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends sudo
  - rm -rf /var/lib/apt/lists/*

# Uncomment and edit to add layers:
# apt:
#   - libreoffice-writer
#   - fonts-noto-cjk
# pip:
#   - pandas
#   - numpy
# npm:
#   - tsx
#   - typescript
